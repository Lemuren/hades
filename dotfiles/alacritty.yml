window:
  padding:
    x: 6
    y: 6
  dynamic_padding: true

font:
  normal:
    family: "Noto Sans Mono"
    style: Regular
  bold:
    family: "Noto Sans Mono"
    style: Bold
  italic:
    family: "Noto Sans Mono"
    style: Regular
  bold_italic:
    family: "Noto Sans Mono"
    style: Bold

  size: 11.0


scrolling:
  history: 10000

cursor:
  style: Beam

colors:
  primary:
    background: '0x191D27'
    foreground: '0xF1F4F8'

  normal:
    black:   '0x191D27'
    red:     '0x850C2C'
    green:   '0x7FB37F'
    yellow:  '0xD9B86C'
    blue:    '0x50359F'   # purple accent
    magenta: '0x6A4BC7'   # accent-light
    cyan:    '0x8C7BCF'   # accent-muted
    white:   '0xF1F4F8'
